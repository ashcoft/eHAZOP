# SonarQube Configuration for eHAZOP
# https://sonarcloud.io/documentation/analysis/analysis-parameters/

# Project identification
sonar.projectKey=ashcoft_eHAZOP
sonar.organization=ashcoft

# Exclude GitHub Actions workflow files from security analysis
# These files require write permissions for CI/CD operations
sonar.exclusions=.github/workflows/**/*,sonar-project.properties

# Source directories
sonar.sources=ehazop_backend/app,frontend/src

# Test directories
sonar.tests=ehazop_backend/tests

# Coverage
sonar.coverage.jacoco.xmlReports.paths=ehazop_backend/coverage.xml

# Security exclusions for CI/CD workflows
sonar.security.exclusions.paths=.github/workflows/**/*
sonar.cpd.exclusions=.github/workflows/**/*
