name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ehazop_backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd ehazop_backend
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          cd ehazop_backend
          pip install ruff
          ruff check . || true

      - name: Format check with black
        run: |
          cd ehazop_backend
          pip install black
          black --check . || true

      - name: Type check with mypy
        run: |
          cd ehazop_backend
          pip install mypy
          mypy app/ --ignore-missing-imports || true

      - name: Run tests
        run: |
          cd ehazop_backend
          pip install pytest pytest-cov
          pytest --cov=app tests/ -v || echo "Tests directory not yet created"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Type check
        run: |
          cd frontend
          npm run type-check || true

      - name: Build
        run: |
          cd frontend
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./ehazop_backend
          push: false
          tags: ehazop-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
