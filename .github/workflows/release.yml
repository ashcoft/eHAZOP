name: Auto Release with Changesets

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install || npm install --legacy-peer-deps

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@297d0992fda6ad5a624c5f64b4bad33ed49543b7
        with:
          cwd: ./frontend
          commit: "chore: version packages"
          title: "chore: version packages"
          publish: npx changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version from changesets
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          cd frontend
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release for Backend
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048
        with:
          tag_name: backend-v${{ steps.version.outputs.version }}
          name: Backend Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Docker build on release
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Release published: ${{ steps.version.outputs.version }}"
          echo "Docker images will be built and pushed automatically"
