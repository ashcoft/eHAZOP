name: Auto Release with Changesets

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install || npm install --legacy-peer-deps

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.4.2
        with:
          cwd: ./frontend
          commit: "chore: version packages"
          title: "chore: version packages"
          publish: npx changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version from changesets
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          cd frontend
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release for Backend
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2.2.0
        with:
          tag_name: backend-v${{ steps.version.outputs.version }}
          name: Backend Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Docker build on release
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Release published: ${{ steps.version.outputs.version }}"
          echo "Docker images will be built and pushed automatically"
