name: Semantic Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major, or specific version)'
        required: false
        default: 'patch'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install || npm install --legacy-peer-deps

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/github @semantic-release/release-notes-generator

      - name: Get current version
        id: current-version
        run: |
          cd frontend
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate next version
        id: next-version
        run: |
          CURRENT="${{ steps.current-version.outputs.current-version }}"
          
          if [ -n "${{ github.event.inputs.version }}" ]; then
            BUMP_TYPE="${{ github.event.inputs.version }}"
          else
            # Auto-detect bump type from commit messages
            BUMP_TYPE="patch"
            git log --format=%B -1 HEAD | grep -iq "breaking" && BUMP_TYPE="major"
            git log --format=%B -1 HEAD | grep -iqE "feat:" && BUMP_TYPE="minor"
          fi
          
          # Calculate new version using Node.js
          VERSION=$(node -e "
            const current = '$CURRENT'.split('.').map(Number);
            const [major, minor, patch] = current;
            let newMajor = major, newMinor = minor, newPatch = patch;
            
            const bumpType = '$BUMP_TYPE';
            if (bumpType === 'major') {
              newMajor = major + 1; newMinor = 0; newPatch = 0;
            } else if (bumpType === 'minor') {
              newMinor = minor + 1; newPatch = 0;
            } else if (bumpType === 'patch') {
              newPatch = patch + 1;
            } else {
              // Specific version provided
              const parts = bumpType.split('.');
              if (parts.length === 3) {
                newMajor = parseInt(parts[0]);
                newMinor = parseInt(parts[1]);
                newPatch = parseInt(parts[2]);
              }
            }
            
            console.log(\`\${newMajor}.\${newMinor}.\${newPatch}\`);
          ")
          
          echo "bump-type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "next-version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION (bump: $BUMP_TYPE)"

      - name: Update frontend version
        run: |
          cd frontend
          npm version ${{ steps.next-version.outputs.next-version }} --no-git-tag-version

      - name: Update backend version in Dockerfile
        run: |
          sed -i 's|ehazop/backend:.*|ehazop/backend:${{ steps.next-version.outputs.next-version }}|' docker-compose.yml
          sed -i 's|ehazop/frontend:.*|ehazop/frontend:${{ steps.next-version.outputs.next-version }}|' docker-compose.yml

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next-version.outputs.next-version }}
          name: Release v${{ steps.next-version.outputs.next-version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git tag -a v${{ steps.next-version.outputs.next-version }} -m "Release v${{ steps.next-version.outputs.next-version }}"
          git push origin v${{ steps.next-version.outputs.next-version }}

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.next-version.outputs.next-version }}"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
